name: Build Snap Package

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name for the uploaded snap artifact.
        required: false
        type: string
        default: development-snap-package

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up tests
        uses: ./.github/actions/setup-tests

      - name: Validate vips-modules version
        working-directory: tests
        env:
          UV_LINK_MODE: copy
        run: uv run pytest -s -v test_vips_version.py

  build-snap:
    name: Build Snap Package
    runs-on: ubuntu-latest
    needs: validate-config

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Snap build
        id: cache-snap
        uses: actions/cache@v4
        with:
          path: "*.snap"
          key: cache-snap-${{ hashFiles('parts/**', 'snap/**', 'src/**') }}

      - name: Get current month
        id: date
        if: steps.cache-snap.outputs.cache-hit != 'true'
        run: echo "month=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Cache Natural Earth geodata
        if: steps.cache-snap.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: geodata-cache/ne_10m_admin_0_countries.geojson
          key: geodata-ne-v5.1.2-239eec57

      - name: Cache GeoNames geodata
        if: steps.cache-snap.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            geodata-cache/cities500.zip
            geodata-cache/admin1CodesASCII.txt
            geodata-cache/admin2Codes.txt
          key: geodata-geonames-${{ steps.date.outputs.month }}

      - name: Download missing geodata assets
        if: steps.cache-snap.outputs.cache-hit != 'true'
        run: |
          mkdir -p geodata-cache
          [ -f geodata-cache/cities500.zip ] || curl -fsSL --retry 5 --retry-all-errors https://download.geonames.org/export/dump/cities500.zip -o geodata-cache/cities500.zip
          [ -f geodata-cache/admin1CodesASCII.txt ] || curl -fsSL --retry 5 --retry-all-errors https://download.geonames.org/export/dump/admin1CodesASCII.txt -o geodata-cache/admin1CodesASCII.txt
          [ -f geodata-cache/admin2Codes.txt ] || curl -fsSL --retry 5 --retry-all-errors https://download.geonames.org/export/dump/admin2Codes.txt -o geodata-cache/admin2Codes.txt
          [ -f geodata-cache/ne_10m_admin_0_countries.geojson ] || curl -fsSL --retry 5 --retry-all-errors https://raw.githubusercontent.com/nvkelso/natural-earth-vector/v5.1.2/geojson/ne_10m_admin_0_countries.geojson -o geodata-cache/ne_10m_admin_0_countries.geojson

      - name: Build snap package
        if: steps.cache-snap.outputs.cache-hit != 'true'
        uses: snapcore/action-build@v1

      - name: Save snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          retention-days: 7
          if-no-files-found: error
          path: "*.snap"

      - name: Run snap-review
        if: steps.cache-snap.outputs.cache-hit != 'true'
        run: |
          sudo snap install review-tools
          snap-review *.snap
