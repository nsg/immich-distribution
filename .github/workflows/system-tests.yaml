name: Build and run System Tests

on:
  push:
    branches:
      - 'bump/**'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

  workflow_dispatch:

jobs:
  validate-config:
    name: Validate Configuration
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'bump/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate vips-modules version
        run: make test-validate -C tests

  build-snap:
    name: Build Snap Package
    runs-on: ubuntu-latest
    needs: validate-config

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Snap build
        id: cache-snap
        uses: actions/cache@v4
        with:
          path: "*.snap"
          key: cache-snap-${{ hashFiles('parts/**', 'snap/**', 'src/**') }}

      - name: Build snap package
        if: steps.cache-snap.outputs.cache-hit != 'true'
        uses: snapcore/action-build@v1
        id: build

      - name: Save snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: development-snap-package
          retention-days: 7
          if-no-files-found: error
          path: "*.snap"

  validate-snap:
    name: Validate Snap Package
    runs-on: ubuntu-latest
    needs: build-snap

    steps:
      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: Run snap-review
        run: |
          sudo snap install review-tools
          snap-review *.snap

  prep-backup:
    name: Prepare installation and backup state
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: build-snap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: TEST | Install package
        run: sudo snap install --dangerous *.snap

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: TEST | Run Prepare Tests
        timeout-minutes: 10
        run: make test-prep -C tests

      - name: TEST | Run Asset Tests
        timeout-minutes: 10
        run: make test-assets -C tests

      - name: Upload test report to StatHost
        if: failure() || cancelled()
        env:
          STATHOST_TOKEN: ${{ secrets.STATHOST_TOKEN }}
        run: ./tests/upload-report.sh

      - name: Backup database and assets
        run: |
          sudo immich-distribution.backup -a -d
          rm -rf ./backups
          cp -rv /var/snap/immich-distribution/common/backups .

      - name: Upload backups and secret.txt
        uses: actions/upload-artifact@v4
        with:
          name: backups
          retention-days: 1
          path: |
            backups
            tests/secret.txt

  prep:
    name: Prepare & Asset Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: build-snap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: TEST | Install package
        run: sudo snap install --dangerous *.snap

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: TEST | Run Prepare Tests
        timeout-minutes: 10
        run: make test-prep -C tests

      - name: TEST | Run Photo Tests
        run: make test-photos -C tests

      - name: Upload test report to StatHost
        if: failure() || cancelled()
        env:
          STATHOST_TOKEN: ${{ secrets.STATHOST_TOKEN }}
        run: ./tests/upload-report.sh

  backup:
    name: Built-in Immich Backup Functionality Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: prep-backup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: TEST | Install package
        run: sudo snap install --dangerous *.snap

      - name: Download backups artifact
        uses: actions/download-artifact@v4
        with:
          name: backups

      - name: Wait Immich Distribution to start
        run: make wait -C tests

      - name: Restore database
        run: |
          sudo cp -rv ./backups/immich_database_*.sql.xz /var/snap/immich-distribution/common/backups
          sudo immich-distribution.restore -y -d /var/snap/immich-distribution/common/backups/immich_database_*.sql.xz

      - name: Restore assets
        run: |
          sudo cp -rv ./backups/immich_assets_*.tar.xz /var/snap/immich-distribution/common/backups
          sudo immich-distribution.restore -y -a /var/snap/immich-distribution/common/backups/immich_assets_*.tar.xz

      - name: TEST | Run Backup Tests
        run: make test-backup -C tests

      - name: Print journal on backup test failure
        if: failure() || cancelled()
        run: |
          echo "Backup test failed. Printing journal logs..."
          sudo journalctl -u snap.immich-distribution.* --no-pager -n 500

  assets:
    name: Test Assets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs: prep-backup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: TEST | Install package
        run: sudo snap install --dangerous *.snap

      - name: Download backups artifact
        uses: actions/download-artifact@v4
        with:
          name: backups

      - name: Wait Immich Distribution to start
        run: make wait -C tests

      - name: Restore database
        run: |
          sudo cp -rv ./backups/immich_database_*.sql.xz /var/snap/immich-distribution/common/backups
          sudo immich-distribution.restore -y -d /var/snap/immich-distribution/common/backups/immich_database_*.sql.xz

      - name: Restore assets
        run: |
          sudo cp -rv ./backups/immich_assets_*.tar.xz /var/snap/immich-distribution/common/backups
          sudo immich-distribution.restore -y -a /var/snap/immich-distribution/common/backups/immich_assets_*.tar.xz

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: TEST | Run Photo Tests
        run: make test-photos -C tests

      - name: Upload test report to StatHost
        if: failure() || cancelled()
        env:
          STATHOST_TOKEN: ${{ secrets.STATHOST_TOKEN }}
        run: ./tests/upload-report.sh

      - name: Trigger built-in Immich backup
        run: |
          ip=$(ip route get 8.8.8.8 | grep -oP 'src \K[^ ]+')
          api_key=$(cat tests/secret.txt)
          curl -s -f -X POST "http://${ip}/api/jobs" \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: $api_key" \
            -d '{"name": "backup-database"}'
          echo "Waiting for built-in backup to complete..."
          sleep 30

      - name: Collect Docker restore test data
        run: |
          mkdir -p docker-restore-data
          sudo cp -v /var/snap/immich-distribution/common/upload/backups/immich-db-backup-*.sql.gz docker-restore-data/
          cp -v tests/secret.txt docker-restore-data/
          sudo tar cJf docker-restore-data/snap-upload.tar.xz -C /var/snap/immich-distribution/common upload

      - name: Upload Docker restore test data
        uses: actions/upload-artifact@v4
        with:
          name: docker-restore-data
          retention-days: 1
          path: docker-restore-data/

  sync:
    name: Test Sync Service
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs: prep-backup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: TEST | Install package
        run: |
          sudo snap install --dangerous *.snap

      - name: Download backups artifact
        uses: actions/download-artifact@v4
        with:
          name: backups

      - name: Wait Immich Distribution to start
        run: make wait -C tests

      - name: Restore database
        run: |
          sudo cp -rv ./backups/immich_database_*.sql.xz /var/snap/immich-distribution/common/backups
          sudo immich-distribution.restore -y -d /var/snap/immich-distribution/common/backups/immich_database_*.sql.xz

      - name: Restore assets
        run: |
          sudo cp -rv ./backups/immich_assets_*.tar.xz /var/snap/immich-distribution/common/backups
          sudo immich-distribution.restore -y -a /var/snap/immich-distribution/common/backups/immich_assets_*.tar.xz

      - name: TEST | Run Sync Tests
        run: EXPECTED_INITIAL_IMAGE_COUNT=0 make test-sync -C tests

      - name: Upload test report to StatHost
        if: failure() || cancelled()
        env:
          STATHOST_TOKEN: ${{ secrets.STATHOST_TOKEN }}
        run: ./tests/upload-report.sh

  cli:
    name: Test CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: prep-backup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: TEST | Install package
        run: |
          sudo snap install --dangerous *.snap

      - name: Download backups artifact
        uses: actions/download-artifact@v4
        with:
          name: backups

      - name: Wait Immich Distribution to start
        run: make wait -C tests

      - name: Restore database
        run: |
          sudo cp -rv ./backups/immich_database_*.sql.xz /var/snap/immich-distribution/common/backups
          sudo immich-distribution.restore -y -d /var/snap/immich-distribution/common/backups/immich_database_*.sql.xz

      - name: Restore assets
        run: |
          sudo cp -rv ./backups/immich_assets_*.tar.xz /var/snap/immich-distribution/common/backups
          sudo immich-distribution.restore -y -a /var/snap/immich-distribution/common/backups/immich_assets_*.tar.xz

      - name: TEST | Run CLI Tests
        run: make test-cli -C tests

  docker-restore:
    name: Test Docker Restore Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs: assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker restore test data
        uses: actions/download-artifact@v4
        with:
          name: docker-restore-data
          path: docker-restore-data

      - name: Create Docker .env
        run: |
          mkdir -p /tmp/immich-upload /tmp/immich-db
          IMMICH_VERSION="$(cat VERSION | tr -d '[:space:]')"
          printf 'UPLOAD_LOCATION=/tmp/immich-upload\nDB_DATA_LOCATION=/tmp/immich-db\nDB_PASSWORD=postgres\nDB_USERNAME=postgres\nDB_DATABASE_NAME=immich\nIMMICH_VERSION=%s\n' "$IMMICH_VERSION" > tests/.env

      - name: Restore snap assets into Docker upload volume
        run: |
          tar xJf docker-restore-data/snap-upload.tar.xz
          cp -a upload/* /tmp/immich-upload/
          rm -rf upload

      - name: Start Docker Immich stack
        run: docker compose -f tests/docker-compose.restore-test.yml up -d

      - name: TEST | Restore snap backup into Docker Immich
        run: |
          export API_KEY=$(cat docker-restore-data/secret.txt)
          export BACKUP_FILE=$(find docker-restore-data -name "immich-db-backup-*.sql.gz" -type f | head -n1)
          export ASSET_DIR=tests/assets
          python3 tests/test_docker_restore.py

      - name: Print Docker logs on failure
        if: failure() || cancelled()
        run: docker compose -f tests/docker-compose.restore-test.yml logs

      - name: Stop Docker Immich stack
        if: always()
        run: docker compose -f tests/docker-compose.restore-test.yml down -v

  snap-restore:
    name: Test Snap Restore Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 25

    needs: build-snap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: Create Docker .env
        run: |
          mkdir -p /tmp/immich-upload /tmp/immich-db
          IMMICH_VERSION="$(cat VERSION | tr -d '[:space:]')"
          printf 'UPLOAD_LOCATION=/tmp/immich-upload\nDB_DATA_LOCATION=/tmp/immich-db\nDB_PASSWORD=postgres\nDB_USERNAME=postgres\nDB_DATABASE_NAME=immich\nIMMICH_VERSION=%s\n' "$IMMICH_VERSION" > tests/.env

      - name: Start Docker Immich stack
        run: docker compose -f tests/docker-compose.restore-test.yml up -d

      - name: Wait for Docker Immich
        run: |
          for i in $(seq 1 60); do
            curl -s http://localhost:2283/api/server/ping | grep -q pong && break
            sleep 5
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Populate Docker Immich with test data
        env:
          IMMICH_IP: localhost:2283
        run: |
          make test-prep -C tests WAIT_SKIP=1
          make test-photos -C tests WAIT_SKIP=1

      - name: Trigger built-in backup in Docker
        run: |
          api_key=$(cat tests/secret.txt)
          curl -s -f -X POST "http://localhost:2283/api/jobs" \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: $api_key" \
            -d '{"name": "backup-database"}'
          echo "Waiting for backup to complete..."
          sleep 30

      - name: Extract backup and assets from Docker
        run: |
          mkdir -p docker-backup
          docker compose -f tests/docker-compose.restore-test.yml exec -T immich-server \
            find /data/backups -name "immich-db-backup-*.sql.gz" -exec cat {} \; > docker-backup/backup.sql.gz
          cp -a /tmp/immich-upload docker-backup/upload

      - name: Stop Docker Immich stack
        run: docker compose -f tests/docker-compose.restore-test.yml down -v

      - name: Install snap
        run: sudo snap install --dangerous *.snap

      - name: Wait for snap to start
        run: make wait -C tests

      - name: Copy assets to snap upload directory
        run: sudo rsync -a --exclude backups --chown root:root docker-backup/upload/ /var/snap/immich-distribution/common/upload/

      - name: TEST | Restore Docker backup into snap
        run: |
          export API_KEY=$(cat tests/secret.txt)
          export BACKUP_FILE=docker-backup/backup.sql.gz
          export IMMICH_URL=http://localhost
          export ASSET_DIR=tests/assets
          python3 tests/test_docker_restore.py

      - name: Print snap logs on failure
        if: failure() || cancelled()
        run: sudo journalctl -u snap.immich-distribution.* --no-pager -n 500

      - name: Upload test report to StatHost
        if: failure() || cancelled()
        env:
          STATHOST_TOKEN: ${{ secrets.STATHOST_TOKEN }}
        run: ./tests/upload-report.sh

  certificate-management:
    name: Test Manual Certificate Management
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: build-snap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: development-snap-package

      - name: TEST | Install package
        run: sudo snap install --dangerous *.snap

      - name: Wait for Immich Distribution to start
        run: make wait -C tests

      - name: TEST | Verify default HTTP-only configuration
        run: |
          echo "Testing default HTTP-only behavior..."
          
          # Verify HTTP port 80 is listening
          sudo ss -tlnp | grep ':80 ' || (echo "ERROR: Port 80 not listening" && exit 1)
          
          # Verify HTTPS port 443 is NOT listening (should fail)
          if sudo ss -tlnp | grep ':443 '; then
            echo "ERROR: Port 443 should not be listening in HTTP-only mode"
            exit 1
          fi
          
          # Test HAProxy stats page shows HTTP frontend enabled, HTTPS disabled
          curl -s 'http://localhost/haproxy;csv' | grep -E "^http,FRONTEND" || (echo "ERROR: HTTP frontend not found" && exit 1)
          
          # Verify HTTPS frontend is missing
          if curl -s 'http://localhost/haproxy;csv' | grep -E "^https,FRONTEND"; then
            echo "ERROR: HTTPS frontend should not be present in HTTP-only mode"
            exit 1
          fi
          
          echo "✓ HTTP-only configuration verified"

      - name: TEST | Generate self-signed certificate
        run: |
          echo "Generating self-signed certificate..."
          
          # Create certificate directory (should already exist from configure hook)
          sudo mkdir -p /var/snap/immich-distribution/common/acme/haproxy
          
          # Generate private key
          sudo openssl genrsa -out /var/snap/immich-distribution/common/acme/haproxy/cert.crt.key 2048
          
          # Generate self-signed certificate
          sudo openssl req -new -x509 \
            -key /var/snap/immich-distribution/common/acme/haproxy/cert.crt.key \
            -out /var/snap/immich-distribution/common/acme/haproxy/cert.crt \
            -days 365 \
            -subj "/C=US/ST=TestState/L=TestCity/O=TestOrg/CN=localhost"
          
          # Verify certificate was created and is valid
          sudo openssl x509 -in /var/snap/immich-distribution/common/acme/haproxy/cert.crt -text -noout | grep -q "CN = localhost" || (echo "ERROR: Certificate creation failed" && exit 1)
          
          echo "✓ Self-signed certificate generated successfully"

      - name: TEST | Enable HTTPS and verify dual HTTP/HTTPS operation
        run: |
          echo "Enabling HTTPS with manual certificate..."
          
          # Enable HTTPS (this should restart HAProxy automatically)
          sudo snap set immich-distribution https-enabled="true"
          
          # Wait a moment for HAProxy to restart
          sleep 5
          
          # Verify both HTTP and HTTPS ports are now listening
          sudo ss -tlnp | grep ':80 ' || (echo "ERROR: Port 80 not listening after HTTPS enable" && exit 1)
          sudo ss -tlnp | grep ':443 ' || (echo "ERROR: Port 443 not listening after HTTPS enable" && exit 1)
          
          # Verify HAProxy stats show both frontends enabled
          curl -s 'http://localhost/haproxy;csv' | grep -E "^http,FRONTEND" || (echo "ERROR: HTTP frontend not found" && exit 1)
          curl -s 'http://localhost/haproxy;csv' | grep -E "^https,FRONTEND" || (echo "ERROR: HTTPS frontend not found" && exit 1)
          
          echo "✓ Dual HTTP/HTTPS operation verified"

      - name: TEST | Disable HTTP and verify HTTPS-only operation
        run: |
          echo "Disabling HTTP frontend for HTTPS-only operation..."
          
          # Disable HTTP frontend
          sudo snap set immich-distribution http-enabled="false"
          
          # Wait a moment for HAProxy to restart
          sleep 5
          
          # Verify port 80 is closed
          if sudo ss -tlnp | grep ':80 '; then
            echo "ERROR: Port 80 should not be listening in HTTPS-only mode"
            exit 1
          fi
          
          # Verify HTTPS port is still listening
          sudo ss -tlnp | grep ':443 ' || (echo "ERROR: Port 443 not listening after HTTP disable" && exit 1)
          
          # Verify HAProxy stats show HTTP frontend disabled, HTTPS enabled
          # Access stats via HTTPS since HTTP is disabled
          curl -k -s 'https://localhost/haproxy;csv' | grep -E "^https,FRONTEND" || (echo "ERROR: HTTPS frontend not found" && exit 1)
          
          # Verify HTTP frontend is missing
          if curl -k -s 'https://localhost/haproxy;csv' | grep -E "^http,FRONTEND"; then
            echo "ERROR: HTTP frontend should not be present in HTTPS-only mode"
            exit 1
          fi
          
          echo "✓ HTTPS-only operation verified"

