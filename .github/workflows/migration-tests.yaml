name: Migration Tests

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-snap:
    name: Build Snap Package
    uses: ./.github/workflows/build-snap.yaml
    with:
      artifact-name: migration-tests-snap-package

  prepare-snap-to-docker-data:
    name: Build snap migration data
    needs: build-snap
    uses: ./.github/workflows/build-snap-migration-data.yaml
    with:
      snap-artifact-name: migration-tests-snap-package
      artifact-name: snap-to-docker-data

  snap-to-docker:
    name: Test migration to Docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare-snap-to-docker-data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download snap migration data
        uses: actions/download-artifact@v4
        with:
          name: snap-to-docker-data
          path: snap-to-docker-data

      - name: Create Docker env file
        run: |
          mkdir -p /tmp/immich-upload /tmp/immich-db tests/runtime
          IMMICH_VERSION="$(cat VERSION | tr -d '[:space:]')"
          printf 'UPLOAD_LOCATION=/tmp/immich-upload\nDB_DATA_LOCATION=/tmp/immich-db\nDB_PASSWORD=postgres\nDB_USERNAME=postgres\nDB_DATABASE_NAME=immich\nIMMICH_VERSION=%s\n' "$IMMICH_VERSION" > tests/runtime/docker.env

      - name: Restore snap assets into Docker upload volume
        run: |
          tar xJf snap-to-docker-data/snap-upload.tar.xz
          cp -a upload/* /tmp/immich-upload/
          rm -rf upload

      - name: Start Docker Immich stack
        run: docker compose --env-file tests/runtime/docker.env -f tests/docker-compose.restore-test.yml up -d

      - name: Set up tests
        uses: ./.github/actions/setup-tests

      - name: Restore snap backup into Docker Immich
        working-directory: tests
        env:
          API_KEY_FILE: ${{ github.workspace }}/snap-to-docker-data/api-key.txt
          ASSET_DIR: ${{ github.workspace }}/tests/assets
          UV_LINK_MODE: copy
        run: |
          export API_KEY="$(cat "$API_KEY_FILE")"
          export BACKUP_FILE="$(find "${{ github.workspace }}/snap-to-docker-data" -name "immich-db-backup-*.sql.gz" -type f | head -n1)"
          uv --version
          uv run pytest -s -v --run-migration-tests test_migration_restore.py

      - name: Print Docker logs on failure
        if: failure() || cancelled()
        run: docker compose --env-file tests/runtime/docker.env -f tests/docker-compose.restore-test.yml logs

      - name: Stop Docker Immich stack
        if: always()
        run: docker compose --env-file tests/runtime/docker.env -f tests/docker-compose.restore-test.yml down -v

  docker-to-snap:
    name: Test migration from Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-snap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Docker env file
        run: |
          mkdir -p /tmp/immich-upload /tmp/immich-db tests/runtime
          IMMICH_VERSION="$(cat VERSION | tr -d '[:space:]')"
          printf 'UPLOAD_LOCATION=/tmp/immich-upload\nDB_DATA_LOCATION=/tmp/immich-db\nDB_PASSWORD=postgres\nDB_USERNAME=postgres\nDB_DATABASE_NAME=immich\nIMMICH_VERSION=%s\n' "$IMMICH_VERSION" > tests/runtime/docker.env

      - name: Start Docker Immich stack
        run: docker compose --env-file tests/runtime/docker.env -f tests/docker-compose.restore-test.yml up -d

      - name: Set up tests
        uses: ./.github/actions/setup-tests

      - name: Populate Docker Immich with test data
        working-directory: tests
        env:
          IMMICH_URL: http://localhost:2283
          API_KEY_FILE: runtime/artifacts/api-key.txt
          UV_LINK_MODE: copy
        run: |
          uv --version
          uv run pytest -s -v --run-snap-tests test_prep.py

      - name: Fetch upstream test assets
        uses: ./.github/actions/fetch-test-assets

      - name: Populate Docker Immich with test assets
        working-directory: tests
        env:
          IMMICH_URL: http://localhost:2283
          API_KEY_FILE: runtime/artifacts/api-key.txt
          ASSET_DIR: assets
          UPSTREAM_TEST_ASSET_DIR: runtime/test-assets
          UV_LINK_MODE: copy
        run: uv run pytest -s -v --run-snap-tests test_assets_uploads.py

      - name: Trigger built-in backup in Docker
        run: |
          api_key=$(cat tests/runtime/artifacts/api-key.txt)
          curl -s -f -X POST "http://localhost:2283/api/jobs" \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: $api_key" \
            -d '{"name": "backup-database"}'
          echo "Waiting for backup to complete..."
          sleep 30

      - name: Extract Docker backup and assets
        run: |
          mkdir -p docker-to-snap-data
          docker compose --env-file tests/runtime/docker.env -f tests/docker-compose.restore-test.yml exec -T immich-server \
            find /data/backups -name "immich-db-backup-*.sql.gz" -exec cat {} \; > docker-to-snap-data/backup.sql.gz
          cp -a /tmp/immich-upload docker-to-snap-data/upload

      - name: Stop Docker Immich stack
        run: docker compose --env-file tests/runtime/docker.env -f tests/docker-compose.restore-test.yml down -v

      - name: Install snap
        uses: ./.github/actions/install-snap
        with:
          artifact-name: migration-tests-snap-package

      - name: Wait for snap to start
        working-directory: tests
        env:
          UV_LINK_MODE: copy
        run: uv run pytest -s -v --run-snap-tests test_smoke.py

      - name: Copy assets to snap upload directory
        run: sudo rsync -a --exclude backups --chown root:root docker-to-snap-data/upload/ /var/snap/immich-distribution/common/upload/

      - name: Restore Docker backup into snap
        working-directory: tests
        env:
          API_KEY_FILE: ${{ github.workspace }}/tests/runtime/artifacts/api-key.txt
          BACKUP_FILE: ${{ github.workspace }}/docker-to-snap-data/backup.sql.gz
          IMMICH_URL: http://localhost
          ASSET_DIR: ${{ github.workspace }}/tests/assets
          UV_LINK_MODE: copy
        run: |
          export API_KEY="$(cat "$API_KEY_FILE")"
          uv --version
          uv run pytest -s -v --run-migration-tests test_migration_restore.py

      - name: Print Docker logs on failure
        if: failure() || cancelled()
        run: docker compose --env-file tests/runtime/docker.env -f tests/docker-compose.restore-test.yml logs

      - name: Print snap logs on failure
        if: failure() || cancelled()
        run: sudo journalctl -u snap.immich-distribution.* --no-pager -n 500
